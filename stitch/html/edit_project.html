<!-- Content Area -->

<!-- Header Section -->

<!-- Form Section -->
<form class="space-y-stack-md" id="projectForm">
<!-- Title Field -->
<div class="flex flex-col space-y-3">
<label class="font-label-sm text-label-sm text-primary uppercase tracking-widest" for="title">Project Title</label>
<input class="bg-background border border-outline-variant p-4 font-body-md text-on-surface form-focus-ring placeholder:text-on-surface-variant/40" id="title" name="title" placeholder="Enter a descriptive name" type="text"/>
</div>
<!-- Description Field -->
<div class="flex flex-col space-y-3">
<label class="font-label-sm text-label-sm text-primary uppercase tracking-widest" for="description">Description</label>
<textarea class="bg-background border border-outline-variant p-4 font-body-md text-on-surface form-focus-ring placeholder:text-on-surface-variant/40 resize-none" id="description" name="description" placeholder="Outline the project scope and builder's intent..." rows="5"></textarea>
</div>
<!-- Bento-like Grid for Tech and Status -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-sm">
<!-- Tech Stack -->
<div class="flex flex-col space-y-3">
<label class="font-label-sm text-label-sm text-primary uppercase tracking-widest" for="tech_stack">Tech Stack</label>
<div class="relative">
<input class="w-full bg-background border border-outline-variant p-4 font-body-md text-on-surface form-focus-ring placeholder:text-on-surface-variant/40" id="tech_stack" name="tech_stack" placeholder="Next.js, Tailwind, Rust" type="text"/>
<div class="mt-3 flex flex-wrap gap-2">
<span class="bg-surface-container-highest px-3 py-1 text-[10px] font-bold text-primary border border-outline-variant uppercase">Next.js</span>

</div>

<option value="active">Active Development</option>
<option value="completed">Completed</option>
<option value="maintenance">Maintenance</option>

<script>
        // Micro-interaction for form focus
        const inputs = document.querySelectorAll('input, textarea, select');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label').style.opacity = '1';
                input.parentElement.querySelector('label').style.color = '#ffffff';
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label').style.opacity = '0.7';
                input.parentElement.querySelector('label').style.color = '';
            });
        });

        // Form submission prevention for demo
        document.getElementById('projectForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.innerText = 'SAVING...';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerText = 'PROJECT SAVED';
                btn.classList.remove('bg-primary');
                btn.classList.add('bg-green-500');
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.classList.add('bg-primary');
                    btn.classList.remove('bg-green-500');
                    btn.disabled = false;
                }, 2000);
            }, 1000);
        });
    </script>
