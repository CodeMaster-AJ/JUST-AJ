<style>
        body {
            background-color: #000000;
            color: #ffffff;
            -webkit-font-smoothing: antialiased;

            border: 1px solid #333333;

        }
        .input-understated:focus {
            outline: none;
            border-color: #ffffff;
            ring: 0;
        }
        .btn-primary {

            color: #000000;
            border-radius: 0;
            transition: opacity 0.2s ease;
        }
        .btn-primary:hover {
            opacity: 0.8;
        }
        .btn-secondary {
            border: 1px solid #333333;
            color: #ffffff;
            border-radius: 0;
            transition: all 0.2s ease;
        }

            color: #000000;

        /* Custom Atmospheric Effect */
        #grain-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;

<body class="flex flex-col min-h-screen items-center justify-center font-body-md text-body-md overflow-hidden">
<canvas id="grain-canvas"></canvas>
<!-- Top Left Identity Anchor -->
<div class="fixed top-margin-desktop left-margin-desktop z-10 hidden md:block">
<h1 class="font-headline-md text-headline-md font-black tracking-tighter text-primary">JUST AJ</h1>
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest mt-unit">Admin Portal</p>
</div>
<main class="w-full max-w-md px-margin-mobile md:px-0 relative z-10">
<!-- Login Card -->
<div class="login-card p-stack-md flex flex-col gap-stack-sm">
<header class="flex flex-col gap-2">
<h2 class="font-headline-xl text-headline-xl tracking-tight">Login</h2>
<p class="text-on-surface-variant font-body-md">Enter your credentials to access the command center.</p>
</header>
<form action="#" class="flex flex-col gap-stack-sm mt-stack-sm" method="POST">
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface uppercase" for="username">Username</label>
<input class="w-full px-4 py-3 input-understated font-body-md text-white" id="username" name="username" placeholder="admin_id" required="" type="text"/>
</div>
<div class="space-y-2">
<div class="flex justify-between items-end">
<label class="font-label-sm text-label-sm text-on-surface uppercase" for="password">Password</label>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Forgot?</a>
</div>
<input class="w-full px-4 py-3 input-understated font-body-md text-white" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<div class="pt-unit">
<button class="w-full py-4 btn-primary font-body-lg font-bold uppercase tracking-widest" type="submit">
                        Login
                    </button>
</div>
</form>
<div class="pt-stack-sm flex justify-center">
<a class="group flex items-center gap-2 font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-all" href="/">
<span class="material-symbols-outlined text-[16px] group-hover:-translate-x-1 transition-transform">arrow_back</span>
                    Back to Site
                </a>
</div>
</div>
</main>
<!-- Bottom Aesthetic Detail -->
<div class="fixed bottom-margin-desktop left-1/2 -translate-x-1/2 opacity-20 hidden md:block">
<p class="font-label-sm text-label-sm tracking-[0.5em] text-on-surface-variant uppercase">Architectural Minimalism • Precision • Clarity</p>
</div>
<!-- Decorative Structural Elements -->
<div class="fixed top-0 right-0 h-full w-[1px] bg-outline-variant opacity-20"></div>
<div class="fixed top-0 left-0 h-full w-[1px] bg-outline-variant opacity-20"></div>
<div class="fixed top-0 left-0 w-full h-[1px] bg-outline-variant opacity-20"></div>
<div class="fixed bottom-0 left-0 w-full h-[1px] bg-outline-variant opacity-20"></div>
<script>
        // Grain Effect Script
        const canvas = document.getElementById('grain-canvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function grain() {
            const imageData = ctx.createImageData(canvas.width, canvas.height);
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                const val = Math.random() * 255;
                data[i] = val;
                data[i + 1] = val;
                data[i + 2] = val;
                data[i + 3] = 30;
            }
            ctx.putImageData(imageData, 0, 0);
        }

        window.addEventListener('resize', resize);
        resize();

        function loop() {
            grain();
            requestAnimationFrame(loop);
        }
        loop();

        // Form Submission Micro-interaction
        document.querySelector('form').addEventListener('submit', (e) => {
            const btn = e.target.querySelector('button');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Authenticating...';
            btn.style.opacity = '0.7';
            btn.disabled = true;
            // Simulated delay
            setTimeout(() => {
                btn.innerHTML = 'Access Granted';
                btn.classList.replace('btn-primary', 'bg-green-500');
            }, 1200);
            e.preventDefault();
        });
    </script>
